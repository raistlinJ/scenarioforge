      responses:
        '302':
          description: Redirect to CORE dashboard with flash status.
  /core/session/{sid}:
    get:
      tags:
        - Core Sessions
        - UI Pages
      summary: Render details for a specific CORE session id
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: CORE session detail HTML.
          content:
            text/html:
              schema:
                type: string
  /participant-ui:
    get:
      tags:
        - Participant UI
        - UI Pages
      summary: Render the Participant Console page
      description: >-
        Renders the Participant UI HTML page.
        Initial scenario selection priority is: incoming `?scenario=...` request,
        then locally remembered last selection, then first listed scenario.
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Optional scenario display name or normalized label hint.
      responses:
        '200':
          description: Participant UI HTML.
          content:
            text/html:
              schema:
                type: string
  /participant-ui/gateway:
    get:
      tags:
        - Participant UI
      summary: Resolve nearest gateway for a participant scenario
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Scenario label (display or normalized). Defaults to current selected scenario.
      responses:
        '200':
          description: Gateway lookup result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantUiGatewayResponse'
        '403':
          description: Scenario not assigned for restricted users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /participant-ui/details:
    get:
      tags:
        - Participant UI
      summary: Participant UI scenario status/details (JSON)
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Scenario label (display or normalized). Defaults to the currently selected scenario.
      responses:
        '200':
          description: Scenario details payload used by the Participant UI dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantUiDetailsResponse'
  /participant-ui/topology:
    get:
      tags:
        - Participant UI
      summary: Participant UI topology graph (JSON)
      description: >-
        Returns graph nodes/links derived from the most recent saved CORE session XML for the requested scenario.
        Network nodes may be returned as `type: switch` for styling purposes; HITL network/interface nodes are
        returned with `type: hitl` and `is_hitl: true`.
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Scenario label (display or normalized). Defaults to the currently selected scenario.
      responses:
        '200':
          description: Topology graph payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantUiTopologyResponse'
        '403':
          description: Scenario not assigned for restricted users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /participant-ui/stats:
    get:
      tags:
        - Participant UI
      summary: Retrieve Participant UI open-count stats
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Scenario label (display or normalized). Defaults to current selected scenario.
      responses:
        '200':
          description: Scenario and totals open-count telemetry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantUiStatsResponse'
  /participant-ui/record-open:
    post:
      tags:
        - Participant UI
      summary: Record that a participant link was opened
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantUiRecordOpenRequest'
      responses:
        '200':
          description: Open count recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantUiRecordOpenResponse'
        '400':
          description: Missing or invalid href.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /participant-ui/open:
    get:
      tags:
        - Participant UI
      summary: Redirect to the participant URL for a scenario
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to participant URL.
        '404':
          description: No participant URL available for the resolved scenario.
  /users:
    get:
      tags:
        - Users
        - UI Pages
      summary: Render the user management page (admin only)
      responses:
        '200':
          description: Users HTML page.
          content:
            text/html:
              schema:
                type: string
    post:
      tags:
        - Users
      summary: Create a new user account
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        '302':
          description: Redirect to users page with flash status.
  /users/delete/{username}:
    post:
      tags:
        - Users
      summary: Delete an existing user account
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to users page.
  /users/password/{username}:
    post:
      tags:
        - Users
      summary: Update another user's password (admin only)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        '302':
          description: Redirect to users page.
  /me/password:
    get:
      tags:
        - Users
        - UI Pages
      summary: Render self-service password change form
      responses:
        '200':
          description: Password change HTML page.
          content:
            text/html:
              schema:
                type: string
    post:
      tags:
        - Users
      summary: Change password for the logged-in user
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - current_password
                - password
              properties:
                current_password:
                  type: string
                password:
                  type: string
      responses:
        '302':
          description: Redirect to index with flash status.
  /vuln_catalog:
    get:
      tags:
        - Vulnerabilities
      summary: Return the vulnerability catalog (JSON)
      responses:
        '200':
          description: Vulnerability catalog JSON.
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      type: string
                  vectors:
                    type: array
                    items:
                      type: string
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /vuln_catalog_page:
    get:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Render the vulnerability catalog page
      responses:
        '200':
          description: Vulnerability catalog HTML page.
          content:
            text/html:
              schema:
                type: string

  /vuln_catalog_packs/upload:
    post:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Upload and install a Vulnerability Catalog Pack ZIP
      description: >-
        Upload a `.zip` file containing directories/subdirectories. Each valid vulnerability directory
        must include a `docker-compose.yml`. The server extracts all files under
        `outputs/installed_vuln_catalogs/<id>/content/` and generates a `vuln_list_w_url.csv`
        that points to the extracted compose files.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                zip_file:
                  type: string
                  format: binary
      responses:
        '302':
          description: Redirect back to vulnerability catalog page.

  /vuln_catalog_packs/import_url:
    post:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Install a Vulnerability Catalog Pack from a URL
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                zip_url:
                  type: string
      responses:
        '302':
          description: Redirect back to vulnerability catalog page.

  /vuln_catalog_packs/download/{catalog_id}:
    get:
      tags:
        - Vulnerabilities
      summary: Download a previously uploaded Vulnerability Catalog Pack ZIP
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ZIP archive.
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /vuln_catalog_packs/browse/{catalog_id}:
    get:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Browse extracted vulnerability pack files (root)
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML directory listing.
          content:
            text/html:
              schema:
                type: string

  /vuln_catalog_packs/browse/{catalog_id}/{subpath}:
    get:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Browse extracted vulnerability pack files (subpath)
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
        - name: subpath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HTML directory listing (or redirects to file download).
          content:
            text/html:
              schema:
                type: string

  /vuln_catalog_packs/file/{catalog_id}/{subpath}:
    get:
      tags:
        - Vulnerabilities
      summary: Download a single extracted file from a vulnerability pack
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
        - name: subpath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /vuln_catalog_packs/set_active/{catalog_id}:
    post:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Mark a Vulnerability Catalog Pack as active
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to vulnerability catalog page.

  /vuln_catalog_packs/delete/{catalog_id}:
    post:
      tags:
        - Vulnerabilities
        - UI Pages
      summary: Delete a Vulnerability Catalog Pack
      parameters:
        - name: catalog_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to vulnerability catalog page.
  /stream/{run_id}:
    get:
      tags:
        - Streaming
      summary: Stream live CLI logs for an asynchronous run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server-sent events stream of CLI output.
          content:
            text/event-stream:
              schema:
                type: string
  /cancel_run/{run_id}:
    post:
      tags:
        - Streaming
      summary: Cancel an asynchronous CLI run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run cancelled (or already finished).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelRunResponse'
        '404':
          description: Run id not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /core/data:
    get:
      tags:
        - Core Sessions
      summary: List CORE sessions and known XML files
      responses:
        '200':
          description: CORE session summaries and XML catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  xmls:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /test_core:
    post:
      tags:
        - Core Sessions
      summary: Validate connectivity to the CORE daemon
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestCoreRequest'
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                host:
                  type: string
                port:
                  type: integer
      responses:
        '200':
          description: Connectivity test result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestCoreResponse'
  /diag/modules:
    get:
      tags:
        - Diagnostics
      summary: Report module import locations for troubleshooting
      responses:
        '200':
          description: Module diagnostic map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagModulesResponse'
  /admin/cleanup_pycore:
    post:
      tags:
        - Admin
      summary: Remove stale `/tmp/pycore.*` directories
      responses:
        '200':
          description: Cleanup summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCleanupPycoreResponse'
        '500':
          description: Cleanup failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCleanupPycoreResponse'
  /vuln_compose/status:
    post:
      tags:
        - Vulnerabilities
      summary: Inspect compose availability for catalog entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnComposeRequest'
      responses:
        '200':
          description: Compose status per item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeStatusResponse'
        '500':
          description: Failure reading compose status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeStatusResponse'
  /vuln_compose/download:
    post:
      tags:
        - Vulnerabilities
      summary: Download compose assets for catalog entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnComposeRequest'
      responses:
        '200':
          description: Download result per item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeDownloadResponse'
        '500':
          description: Failure downloading compose assets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeDownloadResponse'
  /vuln_compose/pull:
    post:
      tags:
        - Vulnerabilities
      summary: Pull docker images defined by compose files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnComposeRequest'
      responses:
        '200':
          description: Pull results per item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposePullResponse'
        '500':
          description: Pull failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposePullResponse'
  /vuln_compose/remove:
    post:
      tags:
        - Vulnerabilities
      summary: Remove downloaded compose assets and stop containers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnComposeRequest'
      responses:
        '200':
          description: Removal results per item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeRemoveResponse'
        '500':
          description: Removal failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnComposeRemoveResponse'
  /purge_history_for_scenario:
    post:
      tags:
        - Reports
      summary: Purge run history for a specific scenario name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurgeHistoryRequest'
      responses:
        '200':
          description: Number of entries removed; `error` is present when pruning failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurgeHistoryResponse'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: Flask session cookie issued after authenticating with `/login`.
  schemas:
    SaveXmlApiRequest:
      type: object
      required:
        - scenarios
      properties:
        scenarios:
          type: array
          description: Full Scenario Editor payload serialized as JSON objects.
          items:
            type: object
            additionalProperties: true
        active_index:
          type: integer
          minimum: 0
          description: Index of the active scenario in the editor (optional).
    SaveXmlApiResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        result_path:
          type: string
          description: Absolute path to the saved Scenario XML file.
        error:
          type: string
          description: Error message when `ok` is false.
    LatestScenarioXmlResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        scenario:
          type: string
        xml_path:
          type: string
        error:
          type: string
    LatestScenarioStateResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        scenario:
          type: string
        scenario_norm:
          type: string
        xml_path:
          type: string
        xml_mtime:
          type: number
        scenario_state:
          type: object
          additionalProperties: true
        core:
          type: object
          nullable: true
          additionalProperties: true
        error:
          type: string
    ProxmoxInterfaceMapping:
      type: object
      properties:
        id:
          type: string
          nullable: true
        macaddr:
          type: string
          nullable: true
        bridge:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        vm_key:
          type: string
          nullable: true
        vm_name:
          type: string
          nullable: true
        vm_node:
          type: string
          nullable: true
        vmid:
          type: string
          nullable: true
        raw:
          type: object
          nullable: true
          additionalProperties: true
      additionalProperties: true
    HostInterface:
      type: object
      properties:
        name:
          type: string
        display:
          type: string
        mac:
          type: string
          nullable: true
        ipv4:
          type: array
          items:
            type: string
            format: ipv4
        ipv6:
          type: array
          items:
            type: string
            format: ipv6
        mtu:
          type: integer
          nullable: true
        speed:
          type: integer
          nullable: true
          description: Interface speed in Mbps when available.
        flags:
          type: array
          items:
            type: string
        is_up:
          type: boolean
        proxmox:
          $ref: '#/components/schemas/ProxmoxInterfaceMapping'
          nullable: true
    HostInterfacesResponse:
      type: object
      properties:
        success:
          type: boolean
        interfaces:
          type: array
          items:
            $ref: '#/components/schemas/HostInterface'
        source:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        fetched_at:
          type: string
          description: Local timestamp string in `MM/DD/YY/HH/MM/SS` format.
          example: "02/15/26/09/47/31"
          nullable: true
      required:
        - interfaces
    HostInterfacesRequest:
      type: object
      properties:
        core_secret_id:
          type: string
          description: Identifier returned when CORE credentials were stored.
        include_down:
          type: boolean
          description: Include interfaces that are currently DOWN.
        core_vm:
          $ref: '#/components/schemas/CoreVmDescriptor'
        scenario_index:
          type: integer
          nullable: true
        scenario_name:
          type: string
          nullable: true
      required:
        - core_secret_id
    CoreVmDescriptor:
      type: object
      properties:
        vm_key:
          type: string
          nullable: true
        vm_name:
          type: string
          nullable: true
        vm_node:
          type: string
          nullable: true
        vmid:
          type: string
          nullable: true
        interfaces:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PlanPreviewRequest:
      type: object
      properties:
        xml_path:
          type: string
          description: Absolute path to the Scenario Editor XML file. Optional when inline `scenarios` are provided.
        scenarios:
          type: array
          description: Inline Scenario Editor payload used to render a temporary XML for preview.
          items:
            type: object
            additionalProperties: true
        core:
          type: object
          nullable: true
          description: Optional top-level core connection/settings payload used when rendering inline scenarios.
          additionalProperties: true
        scenario:
          type: string
          description: Specific scenario name to plan (defaults to the first scenario).
        seed:
          type: integer
          description: Deterministic seed for topology generation (optional).
        r2s_hosts_min_list:
          type: array
          items:
            type: integer
          description: Optional per-router minimum host assignments for aggregation replay.
        r2s_hosts_max_list:
          type: array
          items:
            type: integer
          description: Optional per-router maximum host assignments for aggregation replay.
    PlanPreviewResponse:
      type: object
      properties:
        ok:
          type: boolean
        full_preview:
          type: object
          additionalProperties: true
          description: Deterministic preview payload generated by planning.full_preview.
        plan:
          type: object
          additionalProperties: true
          description: Raw orchestrator plan used to derive the full preview.
        breakdowns:
          type: object
          additionalProperties: true
          description: Section breakdowns (routers, services, vulnerabilities, segmentation, traffic).
        flow_meta:
          type: object
          additionalProperties: true
          description: Flow state metadata attached to the preview when available.
        error:
          type: string
      required:
        - ok
    PersistFlowPlanRequest:
      type: object
      required:
        - xml_path
      properties:
        xml_path:
          type: string
          description: Absolute path to the Scenario Editor XML file.
        scenario:
          type: string
          nullable: true
        seed:
          type: integer
          nullable: true
    PersistFlowPlanResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        xml_path:
          type: string
          nullable: true
        scenario:
          type: string
          nullable: true
        seed:
          type: integer
          nullable: true
        preview_plan_path:
          type: string
          nullable: true
        error:
          type: string
    RunCliAsyncRequest:
      type: object
      required:
        - xml_path
      properties:
        xml_path:
          type: string
          description: Absolute path to the Scenario XML to execute with the CLI.
        seed:
          type: integer
          nullable: true
          description: Optional deterministic seed forwarded to the CLI.
        preview_plan:
          type: string
          nullable: true
          description: Optional absolute path to a persisted plan preview JSON file.
    RunCliAsyncResponse:
      type: object
      required:
        - run_id
      properties:
        run_id:
          type: string
          description: UUID identifying the asynchronous run.
    RunStatusResponse:
      type: object
      properties:
        done:
          type: boolean
        returncode:
          type: integer
          nullable: true
        report_path:
          type: string
          nullable: true
          description: Absolute path to the generated Markdown report when available.
        summary_path:
          type: string
          nullable: true
          description: Absolute path to the generated JSON summary when available.
        xml_path:
          type: string
          nullable: true
          description: Absolute path to the captured post-run CORE session XML when available.
        scenario_xml_path:
          type: string
          description: Absolute path to the Scenario Editor XML file used for the run.
        pre_xml_path:
          type: string
          nullable: true
          description: Absolute path to the captured pre-run CORE session XML when available.
        full_scenario_path:
          type: string
          nullable: true
          description: Absolute path to the generated artifact bundle zip file when available.
        log_path:
          type: string
          nullable: true
