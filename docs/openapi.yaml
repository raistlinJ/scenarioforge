openapi: 3.1.0
info:
  title: ScenarioForge Web API
  version: "2026-03-05"
  description: >-
    OpenAPI specification for the ScenarioForge web backend. The API
    combines JSON endpoints used by the web UI with a set of HTML form
    submissions and download helpers. Most routes require an authenticated
    session established via `/login` and maintained with the Flask session
    cookie.
servers:
  - url: http://localhost:9090
    description: Default development server
  - url: https://localhost
    description: Reverse-proxied TLS endpoint (see README for nginx helper)
tags:
  - name: Authentication
    description: Session management and user login endpoints.
  - name: Scenario Editor
    description: Uploading, downloading, and saving Scenario Editor XML payloads.
  - name: Planning
    description: Deterministic plan previews and related planning helpers.
  - name: Flag Sequencing
    description: Flag sequencing (Flow) endpoints for generating a chain and exporting Attack Flow Builder (.afb).
  - name: Runs
    description: Synchronous and asynchronous CLI execution routes.
  - name: Reports
    description: Report listing, download, and maintenance endpoints.
  - name: Scripts
    description: Generated traffic and segmentation script inspection endpoints.
  - name: Docker
    description: Docker compose status and cleanup helpers for vulnerability services.
  - name: Core Sessions
    description: CORE daemon session lifecycle helpers and diagnostics.
  - name: Diagnostics
    description: Introspection and health endpoints.
  - name: Admin
    description: Administrative helpers and cleanup tasks.
  - name: Generator Builder
    description: Helpers for scaffolding new flag-generators and flag-node-generators.
  - name: Generator Packs
    description: Install/manage Generator Packs and installed generators (manifest-based).
  - name: Vulnerabilities
    description: Compose download/pull helpers for vulnerability catalog entries.
  - name: Users
    description: Administrative endpoints for managing user accounts.
  - name: Streaming
    description: Server-sent events and cancellation endpoints.
  - name: UI Pages
    description: HTML-rendering routes that back the web interface.
  - name: Participant UI
    description: JSON endpoints used by the Participant UI topology/status views.
security:
  - sessionCookie: []
paths:
  /generator_builder:
    get:
      tags:
        - Generator Builder
        - UI Pages
      summary: Render the Generator Builder page
      description: >-
        HTML page for prompt-driven generator authoring, scaffold preview, local test execution,
        and direct README/docker-compose downloads.
      responses:
        '200':
          description: Generator Builder HTML.
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to /login when not authenticated.

  /api/generators/ai_scaffold:
    post:
      tags:
        - Generator Builder
      summary: Generate a scaffold request and file preview using an AI provider
      description: >-
        Calls the selected AI provider, expects a strict JSON scaffold description, normalizes that
        response into a generator-builder scaffold request, and returns previewable file contents.
        The same endpoint is used for iterative refinement by supplying the current scaffold/files
        and the last builder test result as additional context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorAiScaffoldRequest'
      responses:
        '200':
          description: AI-generated scaffold preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorAiScaffoldResponse'
        '400':
          description: Invalid request or unparsable AI response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/generators/prompt_intent_preview:
    post:
      tags:
        - Generator Builder
      summary: Preview Builder prompt intent and manual overrides
      description: >-
        Parses a Generator Builder prompt plus optional text overrides into structured
        runtime inputs, artifact requirements/outputs, injected files, hint_levels, and README notes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorPromptIntentPreviewRequest'
      responses:
        '200':
          description: Parsed prompt intent preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorPromptIntentPreviewResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/generators/builder_test:
    post:
      tags:
        - Generator Builder
      summary: Run a locally staged test for a generated scaffold
      description: >-
        Stages a generated scaffold into a temporary repo-like directory and runs
        `scripts/run_flag_generator.py` against it without requiring pack installation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorBuilderTestRequest'
      responses:
        '200':
          description: Builder test succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorBuilderTestResponse'
        '400':
          description: Invalid scaffold request or test failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '504':
          description: Builder test timed out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/generators/install_generated:
    post:
      tags:
        - Generator Builder
      summary: Install the current generated scaffold into the Generator Packs catalog
      description: >-
        Wraps the current scaffold into a temporary ZIP and installs it using the same
        generator-pack install path as the Flag Catalog upload flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorInstallGeneratedRequest'
      responses:
        '200':
          description: Scaffold installed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorInstallGeneratedResponse'
        '400':
          description: Invalid scaffold payload or install failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/generators/scaffold_meta:
    post:
      tags:
        - Generator Builder
      summary: Generate scaffold metadata
      description: >-
        Returns the generated manifest YAML plus the list of scaffold file paths for the requested
        generator. Used by the Generator Builder UI to preview the manifest and file list.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorBuilderRequest'
      responses:
        '200':
          description: Scaffold metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratorScaffoldMetaResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/generators/scaffold_zip:
    post:
      tags:
        - Generator Builder
      summary: Download a scaffold ZIP for a generator
      description: >-
        Returns a ZIP archive containing a ready-to-unzip scaffold.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratorBuilderRequest'
      responses:
        '200':
          description: ZIP archive.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Login required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Builder/admin role required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /generator_packs/upload:
    post:
      tags:
        - Generator Packs
        - UI Pages
      summary: Upload and install a Generator Pack ZIP
      description: >-
        Upload a `.zip` file containing one or more generators under `flag_generators/` and/or
        `flag_node_generators/`. Installs them under `outputs/installed_generators/`.

        When called as an XMLHttpRequest (`X-Requested-With: XMLHttpRequest`), responds with JSON.
        Otherwise, redirects back to the Flag Catalog page.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                zip_file:
                  type: string
                  format: binary
      responses:
        '302':
          description: Redirect back to catalog page (HTML form submission).
        '200':
          description: JSON response (XHR).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string

  /generator_packs/import_url:
    post:
      tags:
        - Generator Packs
        - UI Pages
      summary: Install a Generator Pack from a URL
      description: Downloads a `.zip` from the provided URL and installs it.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                zip_url:
                  type: string
      responses:
        '302':
          description: Redirect back to catalog page.

  /generator_packs/delete/{pack_id}:
    post:
      tags:
        - Generator Packs
        - UI Pages
      summary: Uninstall a Generator Pack
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect back to catalog page.

  /generator_packs/set_disabled/{pack_id}:
    post:
      tags:
        - Generator Packs
        - UI Pages
      summary: Toggle disabled state for a pack (form endpoint)
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                disabled:
                  type: string
                  description: Treats 'true' as disabled.
      responses:
        '302':
          description: Redirect back to catalog page.

  /api/generator_packs/set_disabled:
    post:
      tags:
        - Generator Packs
      summary: Toggle disabled state for a pack (JSON endpoint)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_id]
              properties:
                pack_id:
                  type: string
                disabled:
                  type: boolean
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string

  /api/flag_generators/set_disabled:
    post:
      tags:
        - Generator Packs
      summary: Toggle disabled state for an installed flag-generator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generator_id]
              properties:
                generator_id:
                  type: string
                disabled:
                  type: boolean
      responses:
        '200':
          description: OK.

  /api/flag_node_generators/set_disabled:
    post:
      tags:
        - Generator Packs
      summary: Toggle disabled state for an installed flag-node-generator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generator_id]
              properties:
                generator_id:
                  type: string
                disabled:
                  type: boolean
      responses:
        '200':
          description: OK.

  /api/flag_generators/delete:
    post:
      tags:
        - Generator Packs
      summary: Delete an installed flag-generator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generator_id]
              properties:
                generator_id:
                  type: string
      responses:
        '200':
          description: OK.

  /api/flag_node_generators/delete:
    post:
      tags:
        - Generator Packs
      summary: Delete an installed flag-node-generator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [generator_id]
              properties:
                generator_id:
                  type: string
      responses:
        '200':
          description: OK.

  /generator_packs/download/{pack_id}:
    get:
      tags:
        - Generator Packs
        - UI Pages
      summary: Download a ZIP for an installed pack
      parameters:
        - name: pack_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ZIP archive.
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /generator_packs/export_all:
    get:
      tags:
        - Generator Packs
        - UI Pages
      summary: Export all installed packs as a bundle ZIP
      responses:
        '200':
          description: ZIP archive containing one ZIP per pack under packs/*.zip.
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /flag_generators_data:
    get:
      tags:
        - Generator Packs
      summary: List installed flag-generators (manifest-based)
      responses:
        '200':
          description: Generator list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  generators:
                    type: array
                    items:
                      type: object
                  errors:
                    type: array
                    items:
                      type: object

  /flag_node_generators_data:
    get:
      tags:
        - Generator Packs
      summary: List installed flag-node-generators (manifest-based)
      responses:
        '200':
          description: Generator list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  generators:
                    type: array
                    items:
                      type: object
                  errors:
                    type: array
                    items:
                      type: object
  /login:
    get:
      tags:
        - Authentication
        - UI Pages
      summary: Render the login form
      description: Returns the HTML login template used by the web UI.
      security: []
      responses:
        '200':
          description: Login form HTML.
          content:
            text/html:
              schema:
                type: string
    post:
      tags:
        - Authentication
      summary: Authenticate a user session
      description: >-
        Validates the submitted credentials and seeds a Flask session cookie.
        On success the client is redirected to the index page; on failure the
        login template is rendered with an error message.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '302':
          description: Redirect to the index page after a successful login.
        '400':
          description: Missing credentials; HTML error response.
          content:
            text/html:
              schema:
                type: string
        '401':
          description: Invalid credentials; HTML error response.
          content:
            text/html:
              schema:
                type: string
  /logout:
    get:
      tags:
        - Authentication
      summary: Log out the current session (GET convenience)
      description: Clears the current session and redirects to the login page.
      responses:
        '302':
          description: Redirect to the login page.
    post:
      tags:
        - Authentication
      summary: Log out the current session
      description: Clears the current session and redirects to the login page.
      responses:
        '302':
          description: Redirect to the login page.
  /healthz:
    get:
      tags:
        - Diagnostics
      summary: Liveness probe
      description: Returns a plain text `ok` body.
      security: []
      responses:
        '200':
          description: Service is healthy.
          content:
            text/plain:
              schema:
                type: string
  /save_xml_api:
    post:
      tags:
        - Scenario Editor
      summary: Save Scenario Editor payload via JSON
      description: >-
        Persists the Scenario Editor payload to XML.
        When topology/IP edits invalidate a previously saved Flow chain, the server
        marks the scenario `flow_state.topology_dirty=true` and clears chain fields
        (`chain_ids`, `length`, `flag_assignments`, `flags_enabled`) to avoid stale
        sequencing reuse.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveXmlApiRequest'
      responses:
        '200':
          description: Scenario XML written successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveXmlApiResponse'
        '400':
          description: Invalid payload or scenarios list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveXmlApiResponse'
        '500':
          description: Unexpected server error while writing XML.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveXmlApiResponse'
  /api/scenario/latest_xml:
    get:
      tags:
        - Scenario Editor
      summary: Get the latest saved XML path for a scenario
      parameters:
        - name: scenario
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest XML path for the scenario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestScenarioXmlResponse'
        '400':
          description: Missing scenario name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No XML found for the scenario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/scenario/latest_state:
    get:
      tags:
        - Scenario Editor
      summary: Parse the latest saved scenario state from XML
      description: >-
        Returns the editor-shaped scenario JSON plus the top-level core configuration for the
        requested scenario. This is useful for round-tripping saved XML back into structured state.
      parameters:
        - name: scenario
          in: query
          required: true
          schema:
            type: string
        - name: xml_path
          in: query
          required: false
          schema:
            type: string
          description: Optional explicit XML path to parse instead of the latest saved XML.
      responses:
        '200':
          description: Parsed scenario state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestScenarioStateResponse'
        '400':
          description: Missing scenario name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: XML not found or scenario missing from XML.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/host_interfaces:
    get:
      tags:
        - Scenario Editor
      summary: Enumerate host interfaces for HITL configuration
      responses:
        '200':
          description: Available host interfaces on the web server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostInterfacesResponse'
    post:
      tags:
        - Scenario Editor
      summary: Enumerate CORE VM interfaces for HITL configuration via SSH tunnel
      description: |
        Enumerates network interfaces on the CORE VM via SSH using stored credentials.
        Only physical adapters (interfaces with a backing `/sys/class/net/<iface>/device` entry)
        are returned in the response payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostInterfacesRequest'
      responses:
        '200':
          description: Interfaces enumerated successfully from the CORE VM.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostInterfacesResponse'
        '400':
          description: Missing credentials or invalid payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: SSH tunnel or remote command failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error while enumerating interfaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /run_cli_async:
    post:
      tags:
        - Runs
      summary: Launch the CLI asynchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCliAsyncRequest'
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - xml_path
              properties:
                xml_path:
                  type: string
                seed:
                  type: integer
                  nullable: true
                preview_plan:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Run accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCliAsyncResponse'
        '400':
          description: Validation error (missing or invalid XML path).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error launching the run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /run_status/{run_id}:
    get:
      tags:
        - Runs
      summary: Retrieve asynchronous run status
      description: >-
        Returns current state for an async execute job.
        A `404` response indicates the run id is unknown/stale and should be treated
        as terminal by clients (stop polling).
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current status for the asynchronous run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatusResponse'
        '404':
          description: Unknown run identifier.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/plan/preview_full:
    post:
      tags:
        - Planning
      summary: Generate a deterministic full preview plan
      description: >-
        Computes a dry-run topology and services preview without starting a CORE session.
        Clients may either provide `xml_path` for an existing saved scenario XML or send inline
        `scenarios` plus optional `core` to have the server render a temporary XML for preview.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanPreviewRequest'
      responses:
        '200':
          description: Full preview response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanPreviewResponse'
        '400':
          description: Validation error (missing XML path or file not found).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanPreviewResponse'
        '500':
          description: Unexpected planning failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanPreviewResponse'
  /api/plan/persist_flow_plan:
    post:
      tags:
        - Planning
      summary: Persist preview metadata into XML
      description: >-
        Computes the full preview for a saved XML and persists preview metadata back into the XML
        so Flow preview endpoints can reuse it later.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersistFlowPlanRequest'
      responses:
        '200':
          description: Preview metadata persisted into XML.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistFlowPlanResponse'
        '400':
          description: Missing XML path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected planning failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/planner/ensure_plan:
    post:
      tags:
        - Planning
      summary: Ensure preview metadata exists for XML
      description: >-
        Planner helper that computes preview metadata for a saved XML and returns the resolved
        XML path, scenario, seed, and preview-plan path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersistFlowPlanRequest'
      responses:
        '200':
          description: Preview metadata ensured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistFlowPlanResponse'
        '400':
          description: Missing XML path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected planning failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/planner/latest_plan:
    get:
      tags:
        - Planning
      summary: Resolve the latest XML for a scenario
      description: >-
        Returns the latest XML path associated with the scenario. Preview metadata is embedded in
        XML, so `preview_plan_path` currently points at the XML file itself.
      parameters:
        - name: scenario
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest XML resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistFlowPlanResponse'
        '400':
          description: Missing scenario name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No XML found for the scenario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/attackflow_preview:
    get:
      tags:
        - Flag Sequencing
      summary: Generate a flag-sequencing chain preview
      description: >-
        Computes an ordered chain of eligible nodes (Docker/vulnerability candidates) from the latest
        preview plan and returns flag generator assignments plus validity metadata used by the Flow UI.
        Flag-generators are placed on vulnerability nodes; flag-node-generators require non-vulnerability
        Docker-role nodes. Initial/Goal facts (if persisted) are returned to steer sequencing.
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
          description: Scenario label (defaults to latest run-history scenario when omitted).
        - name: length
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
        - name: preset
          in: query
          required: false
          schema:
            type: string
          description: Optional preset (forces a fixed chain shape/length).
        - name: prefer_preview
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
        - name: force_preview
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
        - name: best_effort
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
          description: Clamp to available eligible nodes instead of returning 422.
        - name: debug
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
        - name: debug_dag
          in: query
          required: false
          schema:
            type: string
            enum: ['0', '1']
      responses:
        '200':
          description: Chain preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttackflowPreviewResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No preview plan available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Not enough eligible nodes to satisfy requested length.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/latest_preview_plan:
    get:
      tags:
        - Flag Sequencing
      summary: Locate the latest Flow-eligible preview metadata for a scenario
      parameters:
        - name: scenario
          in: query
          required: true
          schema:
            type: string
        - name: xml_path
          in: query
          required: false
          schema:
            type: string
          description: Optional XML path hint to prefer over the latest saved XML.
      responses:
        '200':
          description: Preview metadata status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestPreviewPlanResponse'
        '400':
          description: Missing scenario name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No saved XML with preview metadata found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: CORE VM has not been validated for Flow preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/prepare_preview_for_execute:
    post:
      tags:
        - Flag Sequencing
      summary: Prepare a preview plan for hint resolution/execution
      description: >-
        Runs best-effort preparation steps (e.g., resolving hint placeholders) using the provided chain
        and preview plan path. This endpoint is used by the Flow UI to materialize `hint.txt` after
        generator outputs are available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparePreviewForExecuteRequest'
      responses:
        '200':
          description: Preparation results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparePreviewForExecuteResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Missing preview plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Preparation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/save_flow_substitutions:
    post:
      tags:
        - Flag Sequencing
      summary: Persist Flow substitutions and overrides
      description: >-
        Persists user-edited chain positions plus generator overrides into the canonical
        per-scenario plan (plan_<scenario>.json). Used by the Flow UI “Save Overrides” action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveFlowSubstitutionsRequest'
      responses:
        '200':
          description: Persisted Flow substitutions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveFlowSubstitutionsResponse'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Missing preview plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid chain or generator assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/save_flow_state_to_xml:
    post:
      tags:
        - Flag Sequencing
      summary: Persist FlowState into scenario XML
      description: >-
        Writes the current Flow state into the selected scenario inside the XML file. This is the
        persistence step that makes saved Flow chains round-trip with Scenario Editor XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveFlowStateToXmlRequest'
      responses:
        '200':
          description: Flow state saved into XML.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveFlowStateToXmlResponse'
        '400':
          description: Missing XML path or flow state payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: XML update failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/revalidate_flow:
    post:
      tags:
        - Flag Sequencing
      summary: Revalidate saved Flow outputs in XML
      description: >-
        Validates Flow artifacts already saved in XML. Useful after persisting FlowState to confirm
        that resolved outputs and assignments are still structurally valid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevalidateFlowRequest'
      responses:
        '200':
          description: Flow validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevalidateFlowResponse'
        '400':
          description: Missing scenario or saved Flow outputs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: XML not found for the scenario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/upload_flow_input_file:
    post:
      tags:
        - Flag Sequencing
      summary: Upload a Flow input override file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - scenario
                - file
              properties:
                scenario:
                  type: string
                step_index:
                  type: string
                  nullable: true
                generator_id:
                  type: string
                  nullable: true
                input_name:
                  type: string
                  nullable: true
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  stored_path:
                    type: string
                  stored_filename:
                    type: string
                  original_filename:
                    type: string
                  input_name:
                    type: string
                  scenario:
                    type: string
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/upload_flow_inject_file:
    post:
      tags:
        - Flag Sequencing
      summary: Upload a Flow inject override file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - scenario
