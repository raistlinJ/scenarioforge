      responses:
        '200':
          description: Upload result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  stored_path:
                    type: string
                  stored_filename:
                    type: string
                  original_filename:
                    type: string
                  inject_value:
                    type: string
                  scenario:
                    type: string
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flag-sequencing/afb_from_chain:
    post:
      tags:
