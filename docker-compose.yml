services:
  web:
    build:
      # Build from repo root so requirements.txt and scenarioforge/ are available.
      context: .
      dockerfile: webapp/Dockerfile
      network: host
    container_name: scenarioforge-web
    env_file:
      # Use the same local runtime config as direct Python launches.
      # VM-mode HITL interface names in this file must be resolved guest
      # Linux ifnames, not Proxmox slot ids like net0/net1.
      - path: ./.scenarioforge.env
        required: false
    environment:
      - CORETG_DOCKER_BRIDGE=1
      - CORETG_HOST=0.0.0.0
      - CORETG_PORT=9090
      - CORETG_SECRETS_DIR=/root/.scenarioforge/secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - ${CORETG_DNS_1:-1.1.1.1}
      - ${CORETG_DNS_2:-8.8.8.8}
    volumes:
      # Mount the repo so checked-out code and template changes are visible
      # without rebuilding the image on every compose restart.
      - .:/app
      # Mount the host-side secret store so saved VM/Access credentials survive
      # container rebuilds and remain available to the web app.
      - ${HOME}/.scenarioforge:/root/.scenarioforge
    ports:
      - "${CORETG_PUBLISH_HOST:-127.0.0.1}:${CORETG_WEB_PORT:-9090}:9090"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      network: host
    container_name: scenarioforge-proxy
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    ports:
      - "${CORETG_PUBLISH_HOST:-127.0.0.1}:${CORETG_HTTP_PORT:-80}:80"
      - "${CORETG_PUBLISH_HOST:-127.0.0.1}:${CORETG_HTTPS_PORT:-443}:443"
    networks:
      - app_net
    environment:
      - CERT_DAYS=${CERT_DAYS:-365}
      - CERT_SUBJECT=${CERT_SUBJECT:-/CN=localhost}
      - CERT_SANS=${CERT_SANS:-}
    dns:
      - ${CORETG_DNS_1:-1.1.1.1}
      - ${CORETG_DNS_2:-8.8.8.8}
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
