manifest_version: 1
id: CHANGE_ME_PLUGIN_ID
kind: flag-node-generator
name: TODO
runtime:
  type: docker-compose
  compose_file: docker-compose.yml
  service: generator
inputs:
  - name: seed
    type: string
    required: true
  - name: node_name
    type: string
    required: true
  - name: flag_prefix
    type: string
    required: false
artifacts:
  requires: []
  optional_requires: []
  produces:
    - File(path)
    - Flag(flag_id)
    - FlagDelivery(mode)
    - FlagFile(path)
hint_levels:
  low:
    - "Target: {{NEXT_NODE_IP}}"
  medium:
    - "Generated compose: {{OUTPUT.File(path)}}"
  high:
    - "Use the access instructions and README.md for the complete workflow."
